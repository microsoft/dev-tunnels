name: Test GitHub Workflow

on:
  workflow_dispatch:

jobs:
  debug-session:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install VS Code dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb dbus-x11 libgtk-3-0 libgbm1 libdrm2 libxkbcommon0 \
          libnss3 libasound2t64 libxss1 libatk-bridge2.0-0

    - name: Install VS Code CLI
      run: |
        wget -qO- https://update.code.visualstudio.com/latest/linux-x64/stable | tar -xzf -
        sudo mv VSCode-linux-x64 /usr/local/vscode
        sudo ln -s /usr/local/vscode/code /usr/local/bin/code
        sudo chown root:root /usr/local/vscode/chrome-sandbox
        sudo chmod 4755 /usr/local/vscode/chrome-sandbox

    - name: Configure virtual display for VS Code
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1280x720x24 &
        eval "$(dbus-launch --sh-syntax)"
        echo "DISPLAY=$DISPLAY" >> $GITHUB_ENV
        echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV
        echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID" >> $GITHUB_ENV
        echo "LIBGL_ALWAYS_SOFTWARE=1" >> $GITHUB_ENV
        echo "ELECTRON_OZONE_PLATFORM_HINT=x11" >> $GITHUB_ENV

    - name: Run VS Code Server
      run: |
        dbus-run-session -- bash -c \
          "code tunnel --accept-server-license-terms \
            --tunnel-id fun-hill-4v1r4gw.usw3 \
            --host-token ${{ secrets.DEVTUNNEL_TOKEN }} \
            -- --disable-gpu --disable-software-rasterizer --disable-dev-shm-usage"

